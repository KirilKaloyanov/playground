
@if (isLogged() === false) {
  You can login with the following roles:
  <br />
  <button (click)="login('user')">Login user</button><br />
  <button (click)="login('admin')">Login admin</button><br />
} @else {
  You are logged in as {{ getUserName() }} with {{ getUserRole() }} role.
  <br />
  <button (click)="logout()">Logout</button>
}
